<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Race</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    .container {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    canvas { display: block; }
    .scoreboard {
      background: #12122a;
      border: 1px solid #2a2a55;
      border-radius: 12px;
      padding: 20px;
      min-width: 220px;
    }
    .scoreboard h2 {
      text-align: center;
      font-size: 16px;
      letter-spacing: 3px;
      color: #f0c040;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .car-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
      border-bottom: 1px solid #1e1e40;
    }
    .car-row:last-child { border-bottom: none; }
    .swatch {
      width: 22px;
      height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .car-label { flex: 1; font-size: 13px; color: #ccc; }
    .lap-count {
      font-size: 14px;
      font-weight: bold;
      color: #f0c040;
      min-width: 28px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="container">
  <canvas id="c" width="620" height="620"></canvas>
  <div class="scoreboard">
    <h2>Laps</h2>
    <div id="board"></div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2;
const R = 220;       // track center radius
const TW = 44;       // track width
const SPEED = 0.009; // radians per frame (same for all cars)
const TWO_PI = Math.PI * 2;

const COLORS = [
  '#ff5252', '#ffd740', '#40c4ff', '#69f0ae', '#ff6d00',
  '#e040fb', '#00e5ff', '#ff4081', '#b2ff59', '#ffab40'
];

const cars = COLORS.map((color, i) => ({
  id: i + 1,
  color,
  angle: Math.random() * TWO_PI,
  laps: 0,
  prevAngle: null,
}));
cars.forEach(c => { c.prevAngle = c.angle; });

// ── drawing helpers ──────────────────────────────────────────────────────────

function drawTrack() {
  // Outer grass fill
  ctx.beginPath();
  ctx.arc(cx, cy, R + TW * 0.85, 0, TWO_PI);
  ctx.fillStyle = '#1a5c2a';
  ctx.fill();

  // Tarmac ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, TWO_PI);
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = TW;
  ctx.stroke();

  // Kerb stripe (outer edge)
  ctx.beginPath();
  ctx.arc(cx, cy, R + TW / 2 - 3, 0, TWO_PI);
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 5;
  ctx.stroke();

  // Kerb stripe (inner edge)
  ctx.beginPath();
  ctx.arc(cx, cy, R - TW / 2 + 3, 0, TWO_PI);
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 5;
  ctx.stroke();

  // Dashed centre line
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, TWO_PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  ctx.setLineDash([14, 14]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Inner grass circle
  ctx.beginPath();
  ctx.arc(cx, cy, R - TW / 2 - 2, 0, TWO_PI);
  ctx.fillStyle = '#1a5c2a';
  ctx.fill();

  // Start / finish line (at angle 0, i.e., rightmost point)
  ctx.save();
  ctx.translate(cx, cy);
  // checkerboard-style bar
  const barW = TW - 6;
  const segments = 6;
  const segH = barW / segments;
  for (let s = 0; s < segments; s++) {
    ctx.fillStyle = s % 2 === 0 ? '#fff' : '#000';
    ctx.fillRect(R - TW / 2 + 3, -4 + s * segH, barW, segH);
  }
  ctx.restore();
}

function drawCar(car) {
  const x = cx + Math.cos(car.angle) * R;
  const y = cy + Math.sin(car.angle) * R;

  ctx.save();
  ctx.translate(x, y);
  // car faces tangent direction (angle + 90°)
  ctx.rotate(car.angle + Math.PI / 2);

  const bw = 10, bh = 20;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(-bw / 2 + 2, -bh / 2 + 2, bw, bh);

  // Body
  ctx.fillStyle = car.color;
  ctx.beginPath();
  ctx.roundRect(-bw / 2, -bh / 2, bw, bh, 3);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.roundRect(-bw / 2 + 2, -bh / 2 + 2, bw - 4, 7, 1);
  ctx.fill();

  // Rear window
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(-bw / 2 + 2, bh / 2 - 8, bw - 4, 5, 1);
  ctx.fill();

  ctx.restore();
}

// ── scoreboard ───────────────────────────────────────────────────────────────

function updateBoard() {
  const sorted = [...cars].sort((a, b) => b.laps - a.laps);
  document.getElementById('board').innerHTML = sorted.map(car => `
    <div class="car-row">
      <div class="swatch" style="background:${car.color}"></div>
      <span class="car-label">Car ${car.id}</span>
      <span class="lap-count">${car.laps}</span>
    </div>
  `).join('');
}

// ── animation loop ───────────────────────────────────────────────────────────

function frame() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  drawTrack();

  for (const car of cars) {
    const prev = car.angle;
    car.angle = (car.angle + SPEED) % TWO_PI;

    // Lap completed when crossing the start/finish line (angle wraps 2π→0)
    if (prev > TWO_PI * 0.75 && car.angle < TWO_PI * 0.25) {
      car.laps++;
    }

    drawCar(car);
  }

  updateBoard();
  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
