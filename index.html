<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Race</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
      gap: 20px;
      padding: 20px;
    }
    .container {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    canvas { display: block; }
    .scoreboard {
      background: #12122a;
      border: 1px solid #2a2a55;
      border-radius: 12px;
      padding: 20px;
      min-width: 300px;
    }
    .scoreboard h2 {
      text-align: center;
      font-size: 16px;
      letter-spacing: 3px;
      color: #f0c040;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .car-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
      border-bottom: 1px solid #1e1e40;
    }
    .car-row:last-child { border-bottom: none; }
    .car-row.destroyed { opacity: 0.45; }
    .car-row.destroyed .car-label { text-decoration: line-through; }
    .swatch {
      width: 22px;
      height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .car-row.destroyed .swatch { filter: grayscale(1); }
    .car-label { flex: 1; font-size: 13px; color: #ccc; }
    .col-laps, .col-dist {
      font-size: 14px;
      font-weight: bold;
      color: #f0c040;
      text-align: right;
      min-width: 44px;
    }
    .col-dist { min-width: 72px; color: #80cfff; }
    .board-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px 6px 4px;
      border-bottom: 1px solid #2a2a55;
      margin-bottom: 4px;
    }
    .board-header .car-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .board-header .col-laps, .board-header .col-dist { font-size: 11px; font-weight: normal; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .destroyed-icon { font-size: 12px; margin-left: 2px; }

    /* ── controls panel ── */
    .controls {
      background: #12122a;
      border: 1px solid #2a2a55;
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      gap: 40px;
      align-items: center;
    }
    #stop-btn {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      background: #e05050;
      color: #fff;
      transition: background 0.15s;
    }
    #stop-btn:hover { background: #c03030; }
    #stop-btn.stopped { background: #3a9e5f; }
    #stop-btn.stopped:hover { background: #2e7d4f; }
    .ctrl {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 200px;
    }
    .ctrl-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .ctrl-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }
    .ctrl-value {
      font-size: 14px;
      font-weight: bold;
      color: #f0c040;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #2a2a55;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f0c040;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="container">
  <canvas id="c" width="620" height="620"></canvas>
  <div class="scoreboard">
    <h2>Results</h2>
    <div class="board-header">
      <div class="swatch" style="background:transparent"></div>
      <span class="car-label">Car</span>
      <span class="col-laps">Laps</span>
      <span class="col-dist">Distance</span>
    </div>
    <div id="board"></div>
  </div>
</div>

<div class="controls">
  <div class="ctrl">
    <div class="ctrl-header">
      <span class="ctrl-label">Mean time between strikes</span>
      <span class="ctrl-value"><span id="mean-val">1800</span> ms</span>
    </div>
    <input type="range" id="mean-slider" min="200" max="6000" step="100" value="1800">
  </div>
  <div class="ctrl">
    <div class="ctrl-header">
      <span class="ctrl-label">Number of cars</span>
      <span class="ctrl-value" id="cars-val">10</span>
    </div>
    <input type="range" id="cars-slider" min="1" max="20" step="1" value="10">
  </div>
  <div class="ctrl">
    <div class="ctrl-header">
      <span class="ctrl-label">Destruction radius</span>
      <span class="ctrl-value"><span id="radius-val">28</span> px</span>
    </div>
    <input type="range" id="radius-slider" min="5" max="120" step="1" value="28">
  </div>
  <button id="stop-btn">Stop</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2;
const R = 220;       // track center radius
const TW = 44;       // track width
const SPEED = 0.009; // radians per frame (same for all cars)
const TWO_PI = Math.PI * 2;

const ALL_COLORS = [
  '#ff5252', '#ffd740', '#40c4ff', '#69f0ae', '#ff6d00',
  '#e040fb', '#00e5ff', '#ff4081', '#b2ff59', '#ffab40',
  '#ea80fc', '#64ffda', '#ff6e40', '#ccff90', '#80d8ff',
  '#a7ffeb', '#ff9191', '#ffe57f', '#b388ff', '#84ffff',
];

// ── simulation state ──────────────────────────────────────────────────────────

let lightningMean = 1800;  // ms — controlled by slider
let cars = [];

let hitRadius = 28; // px — how close a strike must be to destroy a car

function initCars(n) {
  cars = ALL_COLORS.slice(0, n).map((color, i) => ({
    id: i + 1,
    color,
    angle: Math.random() * TWO_PI,
    totalAngle: 0,
    laps: 0,
    destroyed: false,
  }));
}

initCars(10);

// ── controls ──────────────────────────────────────────────────────────────────

document.getElementById('mean-slider').addEventListener('input', function () {
  lightningMean = +this.value;
  document.getElementById('mean-val').textContent = this.value;
});

document.getElementById('cars-slider').addEventListener('input', function () {
  const n = +this.value;
  document.getElementById('cars-val').textContent = n;
  initCars(n);
});

document.getElementById('radius-slider').addEventListener('input', function () {
  hitRadius = +this.value;
  document.getElementById('radius-val').textContent = this.value;
});

// ── lightning ─────────────────────────────────────────────────────────────────

const LIGHTNING_DURATION_MS = 350;
const lightnings = [];
const explosions = []; // { x, y, born }
let nextLightningAt = Date.now() + sampleExponential(lightningMean);

function sampleExponential(mean) {
  return -mean * Math.log(1 - Math.random());
}

function spawnLightning() {
  const angle = Math.random() * TWO_PI;
  const tx = cx + Math.cos(angle) * R;
  const ty = cy + Math.sin(angle) * R;
  lightnings.push({ tx, ty, born: Date.now(), bolt: buildBolt(tx, ty), radius: hitRadius });

  // Check every active car for a hit
  for (const car of cars) {
    if (car.destroyed) continue;
    const cx2 = cx + Math.cos(car.angle) * R;
    const cy2 = cy + Math.sin(car.angle) * R;
    const dist = Math.hypot(cx2 - tx, cy2 - ty);
    if (dist <= hitRadius) {
      car.destroyed = true;
      explosions.push({ x: cx2, y: cy2, born: Date.now() });
    }
  }
}

function buildBolt(tx, ty) {
  const pts = [{ x: tx + (Math.random() - 0.5) * 60, y: 0 }];
  const steps = 8 + Math.floor(Math.random() * 5);
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    const x = pts[0].x + (tx - pts[0].x) * t + (Math.random() - 0.5) * 40 * (1 - t);
    const y = ty * t;
    pts.push({ x, y });
  }
  pts.push({ x: tx, y: ty });
  return pts;
}

function drawLightnings(now) {
  for (let i = lightnings.length - 1; i >= 0; i--) {
    const ln = lightnings[i];
    const age = now - ln.born;
    if (age > LIGHTNING_DURATION_MS) { lightnings.splice(i, 1); continue; }

    const t = age / LIGHTNING_DURATION_MS;
    const alpha = t < 0.15 ? t / 0.15 : 1 - (t - 0.15) / 0.85;

    if (t < 0.15) {
      ctx.fillStyle = `rgba(200,220,255,${0.08 * alpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.save();
    ctx.shadowColor = `rgba(160,200,255,${alpha})`;
    ctx.shadowBlur = 24;
    ctx.strokeStyle = `rgba(200,230,255,${alpha * 0.6})`;
    ctx.lineWidth = 6;
    strokeBolt(ln.bolt);
    ctx.shadowBlur = 8;
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 2;
    strokeBolt(ln.bolt);
    ctx.restore();

    const gr = ctx.createRadialGradient(ln.tx, ln.ty, 0, ln.tx, ln.ty, 40);
    gr.addColorStop(0, `rgba(200,220,255,${alpha * 0.7})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(ln.tx, ln.ty, 40, 0, TWO_PI);
    ctx.fill();

    // Destruction radius ring
    ctx.save();
    ctx.strokeStyle = `rgba(255,80,80,${alpha * 0.85})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.shadowColor = `rgba(255,80,80,${alpha})`;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(ln.tx, ln.ty, ln.radius, 0, TWO_PI);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

function strokeBolt(pts) {
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
}

const EXPLOSION_DURATION_MS = 600;

function drawExplosions(now) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    const age = now - ex.born;
    if (age > EXPLOSION_DURATION_MS) { explosions.splice(i, 1); continue; }

    const t = age / EXPLOSION_DURATION_MS; // 0 → 1
    const alpha = 1 - t;
    const radius = 8 + t * 36;

    // Expanding ring
    ctx.save();
    ctx.shadowColor = `rgba(255,160,50,${alpha})`;
    ctx.shadowBlur = 16;
    ctx.strokeStyle = `rgba(255,200,80,${alpha})`;
    ctx.lineWidth = 3 * (1 - t);
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, radius, 0, TWO_PI);
    ctx.stroke();

    // Inner fireball
    const gr = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, radius * 0.6);
    gr.addColorStop(0, `rgba(255,240,100,${alpha * 0.9})`);
    gr.addColorStop(0.5, `rgba(255,120,20,${alpha * 0.6})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, radius * 0.6, 0, TWO_PI);
    ctx.fill();
    ctx.restore();
  }
}

// ── drawing helpers ───────────────────────────────────────────────────────────

function drawTrack() {
  ctx.beginPath();
  ctx.arc(cx, cy, R + TW * 0.85, 0, TWO_PI);
  ctx.fillStyle = '#1a5c2a';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, TWO_PI);
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = TW;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, R + TW / 2 - 3, 0, TWO_PI);
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 5;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, R - TW / 2 + 3, 0, TWO_PI);
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 5;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, TWO_PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  ctx.setLineDash([14, 14]);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath();
  ctx.arc(cx, cy, R - TW / 2 - 2, 0, TWO_PI);
  ctx.fillStyle = '#1a5c2a';
  ctx.fill();

  ctx.save();
  ctx.translate(cx, cy);
  const barW = TW - 6;
  const segments = 6;
  const segH = barW / segments;
  for (let s = 0; s < segments; s++) {
    ctx.fillStyle = s % 2 === 0 ? '#fff' : '#000';
    ctx.fillRect(R - TW / 2 + 3, -4 + s * segH, barW, segH);
  }
  ctx.restore();
}

function drawCar(car) {
  const x = cx + Math.cos(car.angle) * R;
  const y = cy + Math.sin(car.angle) * R;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(car.angle + Math.PI / 2);

  const bw = 10, bh = 20;

  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(-bw / 2 + 2, -bh / 2 + 2, bw, bh);

  ctx.fillStyle = car.color;
  ctx.beginPath();
  ctx.roundRect(-bw / 2, -bh / 2, bw, bh, 3);
  ctx.fill();

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.roundRect(-bw / 2 + 2, -bh / 2 + 2, bw - 4, 7, 1);
  ctx.fill();

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(-bw / 2 + 2, bh / 2 - 8, bw - 4, 5, 1);
  ctx.fill();

  ctx.restore();
}

// ── scoreboard ────────────────────────────────────────────────────────────────

function updateBoard() {
  const sorted = [...cars].sort((a, b) => b.laps - a.laps);
  document.getElementById('board').innerHTML = sorted.map(car => {
    const dist = Math.round(car.totalAngle / TWO_PI * 1000).toLocaleString() + ' m';
    return `
    <div class="car-row${car.destroyed ? ' destroyed' : ''}">
      <div class="swatch" style="background:${car.color}"></div>
      <span class="car-label">Car ${car.id}${car.destroyed ? '<span class="destroyed-icon">&#9889;</span>' : ''}</span>
      <span class="col-laps">${car.laps}${!running && !car.destroyed ? '+' : ''}</span>
      <span class="col-dist">${dist}</span>
    </div>`;
  }).join('');
}

// ── animation loop ────────────────────────────────────────────────────────────

function frame() {
  const now = Date.now();
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  drawTrack();

  if (now >= nextLightningAt) {
    spawnLightning();
    nextLightningAt = now + sampleExponential(lightningMean);
  }
  drawLightnings(now);
  drawExplosions(now);

  for (const car of cars) {
    if (car.destroyed) continue;
    const prev = car.angle;
    car.angle = (car.angle + SPEED) % TWO_PI;
    car.totalAngle += SPEED;
    if (prev > TWO_PI * 0.75 && car.angle < TWO_PI * 0.25) {
      car.laps++;
    }
    drawCar(car);
  }

  updateBoard();
  if (running) requestAnimationFrame(frame);
}

// ── stop / resume ─────────────────────────────────────────────────────────────

let running = true;

document.getElementById('stop-btn').addEventListener('click', function () {
  running = !running;
  this.textContent = running ? 'Stop' : 'Resume';
  this.classList.toggle('stopped', !running);
  if (running) {
    nextLightningAt = Date.now() + sampleExponential(lightningMean);
    requestAnimationFrame(frame);
  } else {
    updateBoard(); // refresh immediately so "+" appears
  }
});

frame();
</script>
</body>
</html>
